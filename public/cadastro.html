<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Cadastro</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Crie sua Conta</h1>
            <p>Junte-se à nossa comunidade profissional</p>
        </div>

        <div class="form-container">
            <form id="cadastroForm" action="/api/cadastro" method="post">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" name="nome" id="nome" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" name="cpf" id="cpf" required placeholder="000.000.000-00">
                </div>

                <div class="form-group">
                    <label for="sexo">Sexo</label>
                    <select name="sexo" id="sexo">
                        <option value="">Selecione</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="O">Outro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="idade">Idade</label>
                    <input type="number" name="idade" id="idade" min="18" max="120">
                </div>

                <div class="form-group">
                    <label for="rua">Rua</label>
                    <input type="text" name="rua" id="rua">
                </div>

                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" name="numero" id="numero">
                </div>

                <div class="form-group">
                    <label for="uf">UF</label>
                    <input type="text" name="uf" id="uf" maxlength="2" placeholder="SP">
                </div>

                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" name="cidade" id="cidade">
                </div>

                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>

            <div id="message" class="message" style="display: none;"></div>
        </div>

        <div class="links">
            <a href="/api/login">Já tem conta? Faça login</a>
        </div>
    </div>
<ul id="lista"></ul>
    <script src="../script.js"></script>
    <script>
        fetch('/api/usuarios')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('lista');
                data.forEach(usuario => {
                    const item = document.createElement('li');
                    item.textContent = `Nome: ${usuario.nome}, CPF: ${usuario.cpf}`;
                    lista.appendChild(item);
                });
                console.log(lista);
            })
            .catch(error => console.error('Erro ao buscar usuários:', error));
            
    </script>
</body>
</html>
