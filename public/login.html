<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7ff, #e0e7ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .notification-card {
            position: relative;
            max-width: 360px;
            width: 100%;
            background: white;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(37, 70, 123, 0.18);
            border: 1px solid rgba(99, 102, 241, 0.15);
            padding: 24px 20px 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .notification-card::before {
            content: "";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 6px;
            border-radius: 999px;
            background: linear-gradient(90deg, #6366f1, #38bdf8);
        }
        .notification-card h2 {
            margin: 0 0 10px;
            color: #312e81;
            font-size: 1.3rem;
        }
        .notification-card p {
            margin: 0;
            color: #4b5563;
            font-size: 0.95rem;
        }
        .close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 999px;
            background: rgba(99, 102, 241, 0.1);
            color: #4338ca;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }
        input[type="text"],
        input[type="password"] {
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }
        input[type="submit"] {
            padding: 12px 14px;
            border: none;
            border-radius: 12px;
            background: #4f46e5;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>
    <div class="notification-card" id="savedCard">
        <button class="close-btn" type="button" onclick="document.getElementById('savedCard').style.display='none'">×</button>
        <h2>Dados Salvos</h2>
        <p>Seu registro foi salvo com sucesso.</p>
    </div>

    <form action="/api/login" method="get">
        <input type="text" name="name" id="name" placeholder="Nome">
        <input type="password" name="password" id="password" placeholder="Senha">
        <input type="submit" value="Submit">
    </form>

    <script src="../script.js"></script>
</body>
</html>
